<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OKR 月度排期</title>
<style>
:root {
  --plan:      #1d4ed8; --plan-bg:   #dbeafe; --plan-muted:   #eff6ff;
  --track:     #15803d; --track-bg:  #bbf7d0; --track-muted:  #f0fdf4;
  --review:    #b45309; --review-bg: #fde68a; --review-muted: #fffbeb;
  --cult:      #6d28d9; --cult-bg:   #ddd6fe; --cult-muted:   #f5f3ff;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,'PingFang SC','Helvetica Neue',sans-serif;background:#f0f4f8;color:#1e293b;font-size:14px;line-height:1.5}

/* ── Header ── */
.hdr{background:#1e293b;padding:16px 28px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:99}
.hdr-title{font-size:16px;font-weight:700;color:#f8fafc;letter-spacing:.2px}
.hdr-date{font-size:12px;color:#94a3b8}

/* ── Legend ── */
.legend{background:#fff;border-bottom:1px solid #e2e8f0;padding:10px 28px;display:flex;gap:18px;flex-wrap:wrap;align-items:center}
.leg-item{display:flex;align-items:center;gap:6px;font-size:12px;color:#475569;font-weight:500}
.leg-dot{width:9px;height:9px;border-radius:3px;flex-shrink:0}

/* ── Grid ── */
.wrap{padding:24px 28px;overflow-x:auto}
.grid{display:grid;grid-template-columns:repeat(4,minmax(250px,1fr));gap:18px}

/* ── Month column ── */
.col{background:#fff;border-radius:14px;border:1px solid #e2e8f0;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.05)}
.col.cur{border-color:#93c5fd;box-shadow:0 0 0 3px #dbeafe, 0 2px 8px rgba(37,99,235,.1)}
.col-hdr{padding:16px 18px 14px;border-bottom:1px solid #f1f5f9}
.col.cur .col-hdr{border-bottom-color:#dbeafe}
.col-month{font-size:22px;font-weight:800;color:#0f172a;letter-spacing:-.5px;line-height:1}
.col-year{font-size:12px;color:#94a3b8;margin-bottom:6px;font-weight:500}
.cur-badge{display:inline-block;font-size:11px;font-weight:600;background:#2563eb;color:#fff;padding:3px 10px;border-radius:20px;margin-top:8px}
.evlist{padding:12px}

/* ── Event card ── */
.ev{margin-bottom:10px;border-radius:10px;overflow:hidden}
.ev.past{opacity:.3}
.ev.today .ev-body{outline:2px solid #f59e0b;outline-offset:-2px;border-radius:0 0 10px 10px}
.ev-accent{height:4px}
.ev.plan   .ev-accent{background:var(--plan-bg)}
.ev.track  .ev-accent{background:var(--track-bg)}
.ev.review .ev-accent{background:var(--review-bg)}
.ev.cult   .ev-accent{background:var(--cult-bg)}
.ev-body{padding:11px 13px 12px;background:#f8fafc;border:1px solid #f1f5f9;border-top:none;border-radius:0 0 10px 10px}
.col.cur .ev-body{background:#fff}

/* ── Card internals ── */
.ev-date{font-size:11px;color:#94a3b8;margin-bottom:6px;display:flex;align-items:center;gap:6px;font-weight:500}
.ev-time{color:#dc2626;font-weight:700;font-size:11px}
.ev-now{font-size:10px;font-weight:700;background:#fef3c7;color:#92400e;padding:1px 6px;border-radius:4px;letter-spacing:.2px}
.ev-label{font-size:13px;font-weight:600;color:#0f172a;line-height:1.5;margin-bottom:9px}
.ev-tags{display:flex;gap:5px;flex-wrap:wrap}
.tag{font-size:11px;font-weight:600;padding:2px 8px;border-radius:5px;letter-spacing:.1px}
.tag.plan  {background:var(--plan-bg);  color:var(--plan)}
.tag.track {background:var(--track-bg); color:var(--track)}
.tag.review{background:var(--review-bg);color:var(--review)}
.tag.cult  {background:var(--cult-bg);  color:var(--cult)}
.tag.role-上级{background:#fee2e2;color:#b91c1c}
.tag.role-员工{background:#e0f2fe;color:#0369a1}
.tag.role-团队{background:#f1f5f9;color:#475569}
.ev-desc{font-size:12px;color:#64748b;margin-top:10px;line-height:1.65;padding-top:10px;border-top:1px dashed #e2e8f0}
.ev-link{color:#2563eb;text-decoration:none;font-weight:500}
.ev-link:hover{text-decoration:underline}

/* ── Today divider ── */
.tdiv{display:flex;align-items:center;gap:8px;padding:4px;margin:8px 0}
.tdiv-line{flex:1;height:1px;background:linear-gradient(90deg,transparent,#fbbf24,transparent)}
.tdiv-txt{font-size:11px;font-weight:700;color:#d97706;white-space:nowrap;background:#fef3c7;padding:2px 8px;border-radius:10px}

@media(max-width:960px){.grid{grid-template-columns:repeat(2,minmax(230px,1fr))}}
@media(max-width:520px){.grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div id="root"></div>
<script>
// ── Holiday data ─────────────────────────────────────────────────────────────
const HOL = new Set([
  // 2025 元旦
  '2025-01-01',
  // 2025 春节
  '2025-01-28','2025-01-29','2025-01-30','2025-01-31',
  '2025-02-01','2025-02-02','2025-02-03','2025-02-04',
  // 2025 清明
  '2025-04-04','2025-04-05','2025-04-06',
  // 2025 劳动节
  '2025-05-01','2025-05-02','2025-05-03','2025-05-04','2025-05-05',
  // 2025 端午
  '2025-05-31','2025-06-01','2025-06-02',
  // 2025 国庆+中秋
  '2025-10-01','2025-10-02','2025-10-03','2025-10-04',
  '2025-10-05','2025-10-06','2025-10-07','2025-10-08',
  // 2026 元旦（国办发明电〔2025〕7号）
  '2026-01-01','2026-01-02','2026-01-03',
  // 2026 春节（2月15日–23日）
  '2026-02-15','2026-02-16','2026-02-17','2026-02-18','2026-02-19',
  '2026-02-20','2026-02-21','2026-02-22','2026-02-23',
  // 2026 清明
  '2026-04-04','2026-04-05','2026-04-06',
  // 2026 劳动节
  '2026-05-01','2026-05-02','2026-05-03','2026-05-04','2026-05-05',
  // 2026 端午
  '2026-06-19','2026-06-20','2026-06-21',
  // 2026 中秋
  '2026-09-25','2026-09-26','2026-09-27',
  // 2026 国庆
  '2026-10-01','2026-10-02','2026-10-03','2026-10-04',
  '2026-10-05','2026-10-06','2026-10-07',
]);

// 补班日（周末当工作日）
const MAKEUP = new Set([
  // 2025
  '2025-01-26','2025-02-08','2025-04-27','2025-09-28','2025-10-11',
  // 2026（国办发明电〔2025〕7号）
  '2026-01-04',  // 周日，元旦补班
  '2026-02-14',  // 周六，春节补班
  '2026-02-28',  // 周六，春节补班
  '2026-05-09',  // 周六，劳动节补班
  '2026-09-20',  // 周日，国庆补班
  '2026-10-10',  // 周六，国庆补班
]);

function ds(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function isWork(d) {
  const s = ds(d);
  if (MAKEUP.has(s)) return true;
  if (HOL.has(s)) return false;
  return d.getDay() !== 0 && d.getDay() !== 6;
}
function nthWork(y, m, n) {
  const d = new Date(y, m-1, 1); let c = 0;
  while (d.getMonth() === m-1) {
    if (isWork(d) && ++c === n) return new Date(d);
    d.setDate(d.getDate()+1);
  }
  return null;
}
function lastNthWork(y, m, n) {
  const d = new Date(y, m, 0); let c = 0;
  while (d.getFullYear() === y && d.getMonth() === m-1) {
    if (isWork(d) && ++c === n) return new Date(d);
    d.setDate(d.getDate()-1);
  }
  return null;
}
function workFridays(y, m) {
  const r = [], d = new Date(y, m-1, 1);
  while (d.getMonth() === m-1) {
    if (d.getDay() === 5 && isWork(d)) r.push(new Date(d));
    d.setDate(d.getDate()+1);
  }
  return r;
}

// ── Event generation ─────────────────────────────────────────────────────────
function getEvents(y, m) {
  const evs = [];
  const add = (date, label, phase, role, time, desc, link) => {
    if (date) evs.push({date, label, phase, role, time: time||null, desc: desc||null, link: link||null});
  };

  const wd5 = nthWork(y,m,5);
  const wd5Label = wd5 ? `${wd5.getMonth()+1}月${wd5.getDate()}日` : '第5个工作日';

  add(nthWork(y,m,1), '上级提交文化评价问卷', 'cult', '上级', null,
    '请填写对团队成员的文化评价问卷',
    {text: '点击填写', url: 'https://n6fo0mbcz6.feishu.cn/share/base/form/shrcnXu5NLgrWDKrcA9E34E8IFf'});

  add(nthWork(y,m,1), '预约上级 1v1 月度绩效沟通', 'review', '员工', null,
    `请在本月第5个工作日（${wd5Label}）前与上级预约月度绩效沟通会议，未完成沟通将影响当月绩效工资发放`);

  add(nthWork(y,m,2), '团队月度复盘会', 'review', '团队', null,
    '请主动联系上级，预约并安排本次月度复盘会议');

  add(wd5, '上级完成上月 OKR 评分 & 确认本月 OKR', 'plan', '上级', '18:00',
    '与各成员进行 1v1，确认本月绩效结果');

  workFridays(y,m).forEach(f => add(f, 'OKR 进展更新 & 周度复盘', 'track', '员工', '18:00',
    '在 OKR 系统上更新本周进度，并提交 OKR 进展报告'));

  add(lastNthWork(y,m,3), '启动下月 OKR 制定 & 开始本月自评', 'review', '员工', null,
    '在 OKR 系统上开始起草下月 OKR，并撰写本月 OKR 复盘文档');

  add(lastNthWork(y,m,1), '提交自评文档 & 下月 OKR 初稿 & 文化自评问卷', 'review', '员工', null,
    '在 OKR 系统上提交本月 OKR 复盘文档，并发布下月 OKR；另需填写文化自评问卷：',
    {text: '点击填写', url: 'https://n6fo0mbcz6.feishu.cn/share/base/form/shrcnOUGAuZGNRck8PbwBvcHevf'});

  evs.sort((a,b) => a.date - b.date);
  return evs;
}

// ── Render ───────────────────────────────────────────────────────────────────
const PL = {plan:'制定', track:'跟进', review:'复盘', cult:'文化'};
const WD = ['日','一','二','三','四','五','六'];

function card(ev, past, today) {
  const dl = `${ev.date.getMonth()+1}月${ev.date.getDate()}日（周${WD[ev.date.getDay()]}）`;
  const linkHtml = ev.link ? `&nbsp;<a class="ev-link" href="${ev.link.url}" target="_blank">${ev.link.text} →</a>` : '';
  const descHtml = ev.desc ? `<div class="ev-desc">${ev.desc}${linkHtml}</div>` : '';
  return `<div class="ev ${ev.phase}${past?' past':''}${today?' today':''}">
    <div class="ev-accent"></div>
    <div class="ev-body">
      <div class="ev-date">${dl}${ev.time?`<span class="ev-time">${ev.time}</span>`:''}${today?'<span class="ev-now">今天</span>':''}</div>
      <div class="ev-label">${ev.label}</div>
      <div class="ev-tags"><span class="tag ${ev.phase}">${PL[ev.phase]}</span><span class="tag role-${ev.role}">${ev.role}</span></div>
      ${descHtml}
    </div>
  </div>`;
}

function todayDiv(today) {
  return `<div class="tdiv"><div class="tdiv-line"></div><div class="tdiv-txt">今天 ${today.getMonth()+1}月${today.getDate()}日</div><div class="tdiv-line"></div></div>`;
}

function renderCol(y, m, isCur, today) {
  const tstr = ds(today);
  const evs = getEvents(y, m);
  let html = '';

  if (!isCur) {
    html = evs.map(e => card(e, false, false)).join('');
  } else {
    let divDone = false;
    const allPast = evs.every(e => ds(e.date) < tstr);
    if (allPast) {
      html = evs.map(e => card(e, true, false)).join('') + todayDiv(today);
    } else {
      evs.forEach(e => {
        const s = ds(e.date), past = s < tstr, isT = s === tstr;
        if (!divDone && s >= tstr) {
          if (!isT) html += todayDiv(today);
          divDone = true;
        }
        html += card(e, past, isT);
      });
    }
  }

  return `<div class="col${isCur?' cur':''}">
    <div class="col-hdr">
      <div class="col-year">${String(y).slice(2)}年</div>
      <div class="col-month">${m}月</div>
      ${isCur?'<span class="cur-badge">本月</span>':''}
    </div>
    <div class="evlist">${html}</div>
  </div>`;
}

function render() {
  const t = new Date(), cy = t.getFullYear(), cm = t.getMonth()+1;
  const cols = [];
  for (let i = -1; i <= 2; i++) {
    let m = cm+i, y = cy;
    if (m < 1) { m += 12; y--; }
    if (m > 12) { m -= 12; y++; }
    cols.push(renderCol(y, m, y===cy && m===cm, t));
  }
  document.getElementById('root').innerHTML = `
    <div class="hdr">
      <div class="hdr-title">OKR 月度排期</div>
      <div class="hdr-date">今天：${cy}年${cm}月${t.getDate()}日&nbsp;周${WD[t.getDay()]}</div>
    </div>
    <div class="legend">
      <div class="leg-item"><div class="leg-dot" style="background:var(--plan-bg)"></div>制定</div>
      <div class="leg-item"><div class="leg-dot" style="background:var(--track-bg)"></div>跟进</div>
      <div class="leg-item"><div class="leg-dot" style="background:var(--review-bg)"></div>复盘</div>
      <div class="leg-item"><div class="leg-dot" style="background:var(--cult-bg)"></div>文化问卷</div>
    </div>
    <div class="wrap"><div class="grid">${cols.join('')}</div></div>`;
}
render();
</script>
</body>
</html>
